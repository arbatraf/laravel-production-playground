name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: laravel_production_playground_testing
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laravel_production_playground_testing
      DB_USERNAME: root
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: bcmath, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: yarn

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browser
        run: yarn playwright install --with-deps chromium

      - name: Audit dependencies
        run: |
          composer audit --locked --abandoned=fail
          yarn audit --level high

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          php artisan config:clear --ansi
          php artisan migrate --force --ansi

      - name: Run PHP quality gate
        run: composer run check

      - name: Build assets
        run: yarn build

      - name: Run HTTP smoke test
        run: yarn test:e2e
